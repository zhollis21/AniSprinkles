# CI workflow: Builds the app, runs unit tests, and captures UI screenshots
# Triggers on push to main branch or pull request creation/update
# Screenshots are uploaded as artifacts and embedded directly in PR comments
#
# Auth note: AniSprinkles uses OAuth 2.0 implicit grant via AniList's browser-based
# login — there is no username/password flow. To capture authenticated screenshots,
# add an AniList OAuth token as the ANILIST_CI_TOKEN repo secret. The debug-only
# SeedCiAuthToken() method in MainActivity reads this from the launch intent and
# seeds SecureStorage before the first page model checks auth.
#
# Without the secret, the workflow still works — screenshots show the sign-in prompts,
# which is useful for catching login UX regressions.
name: CI Build & UI Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/AniSprinkles.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install MAUI Workload
        run: dotnet workload install maui-android

      - name: Restore Dependencies
        run: dotnet restore src/AniSprinkles.csproj

      - name: Build
        run: |
          dotnet build src/AniSprinkles.csproj \
            -c Debug \
            -f net10.0-android \
            -p:EmbedAssembliesIntoApk=true \
            --no-restore

      - name: Run Tests
        run: |
          # Auto-detect test projects so future additions are picked up
          TEST_PROJECTS=$(find . -name "*.csproj" \( -path "*/tests/*" -o -path "*/test/*" -o -name "*Test*.csproj" -o -name "*Tests*.csproj" \) | grep -v node_modules || true)
          if [ -n "$TEST_PROJECTS" ]; then
            echo "Found test projects:"
            echo "$TEST_PROJECTS"
            for proj in $TEST_PROJECTS; do
              dotnet test "$proj" --no-restore --verbosity normal
            done
          else
            echo "::notice::No test projects found. Tests will run automatically when added."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: src/bin/Debug/net10.0-android/*-Signed.apk
          retention-days: 7
          if-no-files-found: error

      - name: Generate Build Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "**Framework:** net10.0-android" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  ui-screenshots:
    name: UI Screenshots
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25
    # Screenshots are informational — emulator flakiness should not block the CI gate
    continue-on-error: true

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The emulator-runner action executes each script line as a separate
      # `sh -c` invocation, which breaks multi-line constructs (if/fi, for/done).
      # Work around this by writing the full script to a temp file first.
      - name: Create Screenshot Script
        run: |
          cat > /tmp/capture_screenshots.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          # Locate the APK
          APK_PATH=$(find apk -name "*-Signed.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No signed APK found in artifacts"
            exit 1
          fi
          echo "Installing APK: $APK_PATH"

          # Install the app on the emulator
          adb install "$APK_PATH"

          # Launch the app — if ANILIST_CI_TOKEN is set, pass it as an intent extra
          # so the debug-only SeedCiAuthToken() in MainActivity can store it in
          # SecureStorage before the first page model checks authentication.
          PACKAGE="com.RainbowSprinkles.AniSprinkles"
          if [ -n "$ANILIST_CI_TOKEN" ]; then
            echo "::notice::ANILIST_CI_TOKEN found — launching with auth token"
            COMPONENT=$(adb shell cmd package resolve-activity --brief \
              -c android.intent.category.LAUNCHER "$PACKAGE" 2>/dev/null | tail -1)
            adb shell am start -n "$COMPONENT" --es ci_auth_token "$ANILIST_CI_TOKEN"
            AUTH_MODE="authenticated"
          else
            echo "::notice::No ANILIST_CI_TOKEN — screenshots will show sign-in prompts"
            adb shell monkey -p "$PACKAGE" -c android.intent.category.LAUNCHER 1
            AUTH_MODE="unauthenticated"
          fi

          # Poll for app window to appear (up to 30s)
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if adb shell dumpsys window windows 2>/dev/null | grep -q "$PACKAGE"; then
              echo "App window detected after ${i}s"
              break
            fi
            sleep 1
          done

          # Allow extra time for initial render and data fetch to complete
          AUTH_RENDER_WAIT=15   # authenticated mode: AniList API calls need more time
          UNAUTH_RENDER_WAIT=5  # unauthenticated mode: just rendering the sign-in prompt
          if [ "$AUTH_MODE" = "authenticated" ]; then
            sleep $AUTH_RENDER_WAIT
          else
            sleep $UNAUTH_RENDER_WAIT
          fi

          mkdir -p screenshots

          # Screenshot 1: My Anime page (default flyout destination)
          adb shell screencap -p /sdcard/my_anime.png || echo "::warning::Failed to capture My Anime screenshot"
          adb pull /sdcard/my_anime.png screenshots/01_my_anime.png || echo "::warning::Failed to pull My Anime screenshot"
          echo "Captured: 01_my_anime.png (My Anime — $AUTH_MODE)"

          # Navigate to Settings page via the flyout
          adb shell input keyevent KEYCODE_MENU || adb shell input swipe 0 500 300 500 300
          sleep 2
          # Tap approximate location of Settings item in flyout (may need tuning per emulator resolution)
          adb shell input tap 200 350
          sleep 3

          # Screenshot 2: Settings page
          adb shell screencap -p /sdcard/settings.png || echo "::warning::Failed to capture Settings screenshot"
          adb pull /sdcard/settings.png screenshots/02_settings.png || echo "::warning::Failed to pull Settings screenshot"
          echo "Captured: 02_settings.png (Settings — $AUTH_MODE)"

          echo ""
          echo "Auth mode: $AUTH_MODE"
          echo "Screenshots captured:"
          ls -la screenshots/
          SCRIPT
          chmod +x /tmp/capture_screenshots.sh

      - name: Run Emulator & Capture Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANILIST_CI_TOKEN: ${{ secrets.ANILIST_CI_TOKEN }}
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: /tmp/capture_screenshots.sh

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HAS_TOKEN: ${{ secrets.ANILIST_CI_TOKEN != '' }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- ci-ui-screenshots -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const hasToken = process.env.HAS_TOKEN === 'true';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const screenshotRef = 'ci-screenshots';

            // --- Upload screenshots as git blobs and commit to ci-screenshots ref ---
            const screenshots = [
              { file: 'screenshots/01_my_anime.png', label: 'My Anime' },
              { file: 'screenshots/02_settings.png', label: 'Settings' },
            ];

            const imageMarkdowns = [];
            const blobPaths = [];

            for (const shot of screenshots) {
              if (!fs.existsSync(shot.file)) {
                core.warning(`Screenshot not found: ${shot.file}`);
                continue;
              }
              const content = fs.readFileSync(shot.file).toString('base64');
              const filename = path.basename(shot.file);
              // Namespace by PR number and run ID so images don't collide
              const blobPath = `pr-${prNumber}/${context.runId}/${filename}`;

              const { data: blob } = await github.rest.git.createBlob({
                owner, repo,
                content,
                encoding: 'base64',
              });
              blobPaths.push({ path: blobPath, sha: blob.sha, label: shot.label });
            }

            if (blobPaths.length > 0) {
              // Create tree entries for all uploaded blobs
              const treeItems = blobPaths.map(b => ({
                path: b.path,
                mode: '100644',
                type: 'blob',
                sha: b.sha,
              }));

              // Try to get existing ci-screenshots ref for parent commit
              let parentSha = null;
              try {
                const { data: ref } = await github.rest.git.getRef({
                  owner, repo, ref: `heads/${screenshotRef}`,
                });
                parentSha = ref.object.sha;
              } catch (e) {
                core.info('ci-screenshots branch does not exist yet — will create it');
              }

              // Build tree — if we have a parent, base on its tree to preserve history
              let treeParams = { owner, repo, tree: treeItems };
              if (parentSha) {
                const { data: parentCommit } = await github.rest.git.getCommit({
                  owner, repo, commit_sha: parentSha,
                });
                treeParams.base_tree = parentCommit.tree.sha;
              }
              const { data: tree } = await github.rest.git.createTree(treeParams);

              // Create commit
              const commitParams = {
                owner, repo,
                message: `CI screenshots for PR #${prNumber} (run ${context.runId})`,
                tree: tree.sha,
              };
              if (parentSha) {
                commitParams.parents = [parentSha];
              }
              const { data: commit } = await github.rest.git.createCommit(commitParams);

              // Update or create the ref
              if (parentSha) {
                await github.rest.git.updateRef({
                  owner, repo,
                  ref: `heads/${screenshotRef}`,
                  sha: commit.sha,
                });
              } else {
                await github.rest.git.createRef({
                  owner, repo,
                  ref: `refs/heads/${screenshotRef}`,
                  sha: commit.sha,
                });
              }

              // Build image markdown using raw.githubusercontent.com
              for (const b of blobPaths) {
                const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${screenshotRef}/${b.path}`;
                imageMarkdowns.push({ label: b.label, url: rawUrl });
              }
              core.info(`Pushed ${blobPaths.length} screenshots to ${screenshotRef} branch`);
            }

            // --- Build PR comment body ---
            const authNote = hasToken
              ? '> ✅ **Authenticated screenshots** — `ANILIST_CI_TOKEN` is configured, '
                + 'so screenshots show the real app UI with live data.'
              : '> ℹ️ **Unauthenticated screenshots** — No `ANILIST_CI_TOKEN` secret set. '
                + 'Screenshots show the sign-in prompt.\n'
                + '> To capture authenticated UI, add an AniList OAuth token as the '
                + '`ANILIST_CI_TOKEN` repo secret.';
            const pageDesc = hasToken ? '' : ' (sign-in prompt)';

            const bodyParts = [
              marker,
              '## 📱 UI Screenshots',
              '',
              authNote,
              '',
              `**[View Workflow Run →](${runUrl})**`,
              '',
            ];

            if (imageMarkdowns.length > 0) {
              // Embed images side-by-side in a table
              bodyParts.push(
                '| ' + imageMarkdowns.map(i => `${i.label}${pageDesc}`).join(' | ') + ' |',
                '| ' + imageMarkdowns.map(() => ':---:').join(' | ') + ' |',
                '| ' + imageMarkdowns.map(i => `![${i.label}](${i.url})`).join(' | ') + ' |',
              );
            } else {
              bodyParts.push(
                '⚠️ No screenshots were captured for this run.',
                '',
                '> Download the **ui-screenshots** artifact from the Artifacts section at the bottom of the workflow run page.',
              );
            }

            const body = bodyParts.join('\n');

            // --- Post or update the PR comment ---
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing PR comment with embedded screenshots');
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body,
              });
              core.info('Posted PR comment with embedded screenshots');
            }

      - name: Generate Screenshot Summary
        if: always()
        env:
          HAS_TOKEN: ${{ secrets.ANILIST_CI_TOKEN != '' }}
        run: |
          echo "## 📱 UI Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "screenshots" ] && [ "$(ls -A screenshots/ 2>/dev/null)" ]; then
            echo "Screenshots captured and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$HAS_TOKEN" = "true" ]; then
              echo "> ✅ **Authenticated** — \`ANILIST_CI_TOKEN\` is configured. Screenshots show real app UI." >> $GITHUB_STEP_SUMMARY
            else
              echo "> ℹ️ **Unauthenticated** — No \`ANILIST_CI_TOKEN\` secret. Screenshots show sign-in prompts." >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Screenshot | Page |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| \`01_my_anime.png\` | My Anime |" >> $GITHUB_STEP_SUMMARY
            echo "| \`02_settings.png\` | Settings |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No screenshots were captured. Check the emulator step logs." >> $GITHUB_STEP_SUMMARY
          fi
