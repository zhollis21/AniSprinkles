# CI workflow: Builds the app, runs unit tests, and captures UI screenshots
# Triggers on pull request creation/update targeting main
# Screenshots are committed to the screenshots/ folder on the branch and
# embedded in PR comments using commit-SHA-based URLs for reliable rendering
#
# Auth note: The CI build uses compile-time stub services (CIAuthService, CIAniListClient)
# activated by -p:CiBuild=true. These stubs make the app appear fully authenticated
# with hardcoded data, so screenshots show the real UI without any OAuth token or
# GitHub secret. No ANILIST_CI_TOKEN secret is needed.
name: CI Build & UI Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/AniSprinkles.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install MAUI Workload
        run: dotnet workload install maui-android

      - name: Restore Dependencies
        run: dotnet restore src/AniSprinkles.csproj

      - name: Build
        run: |
          dotnet build src/AniSprinkles.csproj \
            -c Debug \
            -f net10.0-android \
            -p:EmbedAssembliesIntoApk=true \
            -p:CiBuild=true \
            --no-restore

      - name: Run Tests
        run: |
          # Auto-detect test projects so future additions are picked up
          TEST_PROJECTS=$(find . -name "*.csproj" \( -path "*/tests/*" -o -path "*/test/*" -o -name "*Test*.csproj" -o -name "*Tests*.csproj" \) | grep -v node_modules || true)
          if [ -n "$TEST_PROJECTS" ]; then
            echo "Found test projects:"
            echo "$TEST_PROJECTS"
            for proj in $TEST_PROJECTS; do
              dotnet test "$proj" --no-restore --verbosity normal
            done
          else
            echo "::notice::No test projects found. Tests will run automatically when added."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: src/bin/Debug/net10.0-android/*-Signed.apk
          retention-days: 5
          if-no-files-found: error

      - name: Generate Build Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "**Framework:** net10.0-android" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  ui-screenshots:
    name: UI Screenshots
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    # Screenshots are informational — emulator flakiness should not block the CI gate
    continue-on-error: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: debug-apk
          path: /tmp/apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The emulator-runner action executes each script line as a separate
      # `sh -c` invocation, which breaks multi-line constructs (if/fi, for/done).
      # Work around this by writing the full script to a temp file first.
      - name: Create Screenshot Script
        run: |
          cat > /tmp/capture_screenshots.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail

          # Shared helper: find a UI node by attribute value, parse its bounds, and tap it.
          # Usage: _tap_by_attribute "text" "ONE PIECE"
          #        _tap_by_attribute "content-desc" "Open navigation drawer"
          _tap_by_attribute() {
            local attr="$1" value="$2"
            # Remove any previous dump so a failed dump cannot leave us parsing stale UI.
            adb shell rm -f /sdcard/ui_tap.xml >/dev/null 2>&1 || true
            if ! adb shell uiautomator dump /sdcard/ui_tap.xml >/dev/null 2>&1; then
              echo "::warning::Failed to dump current UI hierarchy"
              return 1
            fi
            if ! adb shell test -s /sdcard/ui_tap.xml >/dev/null 2>&1; then
              echo "::warning::UI hierarchy dump was not written"
              return 1
            fi
            local bounds
            # `|| true` suppresses pipefail when grep finds no match (exits 1),
            # leaving $bounds empty — handled by the guard below.
            # Note: grep -o is regex; all current callers pass plain string literals
            # with no metacharacters, so this is safe as-is.
            bounds=$(adb shell cat /sdcard/ui_tap.xml 2>/dev/null \
              | grep -o "${attr}=\"${value}\"[^>]*" \
              | grep -o 'bounds="\[[0-9]*,[0-9]*\]\[[0-9]*,[0-9]*\]"' \
              | head -1 \
              | sed 's/bounds="//;s/"//') || true
            if [ -z "$bounds" ]; then
              echo "::warning::Could not find element with ${attr}='${value}'"
              return 1
            fi
            local left top right bottom cx cy
            left=$(echo "$bounds" | sed 's/\[//g;s/\]/ /g' | awk -F'[, ]' '{print $1}')
            top=$(echo "$bounds" | sed 's/\[//g;s/\]/ /g' | awk -F'[, ]' '{print $2}')
            right=$(echo "$bounds" | sed 's/\[//g;s/\]/ /g' | awk -F'[, ]' '{print $3}')
            bottom=$(echo "$bounds" | sed 's/\[//g;s/\]/ /g' | awk -F'[, ]' '{print $4}')
            cx=$(( (left + right) / 2 ))
            cy=$(( (top + bottom) / 2 ))
            echo "Tapping ${attr}='${value}' at (${cx}, ${cy}) — bounds: ${bounds}"
            adb shell input tap "$cx" "$cy"
          }

          # Tap a UI element by its visible text label.
          # Usage: tap_element_by_text "Settings"
          tap_element_by_text()         { _tap_by_attribute "text"         "$1"; }

          # Tap a UI element by its content-desc attribute (for icon buttons with no label).
          # Usage: tap_element_by_content_desc "Open navigation drawer"
          tap_element_by_content_desc() { _tap_by_attribute "content-desc" "$1"; }

          # Locate the APK
          APK_PATH=$(find /tmp/apk -name "*-Signed.apk" -type f | head -1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No signed APK found in artifacts"
            exit 1
          fi
          echo "Installing APK: $APK_PATH"

          # Install or replace the app on the emulator. `-r` handles reused AVDs
          # and `-d` allows reinstall if a newer debug build is already present.
          adb install -r -d "$APK_PATH"

          # Verify the package actually installed before trying to launch it.
          PACKAGE="com.RainbowSprinkles.AniSprinkles"
          if ! adb shell pm list packages | grep -q "$PACKAGE"; then
            echo "::error::Package $PACKAGE not found after install — aborting"
            exit 1
          fi

          # Dismiss the lock screen before launching so it doesn't appear in screenshots.
          adb shell wm dismiss-keyguard

          # Resolve the launcher activity dynamically so this survives any future
          # MAUI namespace or assembly renames (which change the crc64 class name).
          MAIN_ACTIVITY=$(adb shell cmd package resolve-activity --brief -c android.intent.category.LAUNCHER "$PACKAGE" | tail -1 || true)
          if [ -z "$MAIN_ACTIVITY" ] || echo "$MAIN_ACTIVITY" | grep -qi "error\|no activity"; then
            echo "::error::Could not resolve launcher activity for $PACKAGE — got: '$MAIN_ACTIVITY'"
            exit 1
          fi
          echo "Launching: $MAIN_ACTIVITY"

          # -W: wait until onResume before returning (eliminates window-detection race)
          # -S: force-stop any stale process first
          adb shell am start -W -S -n "$MAIN_ACTIVITY"
          AUTH_MODE="ci-stubs"

          # Poll for app window to appear (up to 30s).
          # -W in am start blocks until onResume, so the window should already be
          # visible, but we poll as a safety net for slow emulator rendering.
          echo "Waiting for app to start..."
          WINDOW_FOUND=0
          for i in $(seq 1 30); do
            if adb shell dumpsys window windows 2>/dev/null | grep -q "$PACKAGE"; then
              echo "App window detected after ${i}s"
              WINDOW_FOUND=1
              break
            fi
            sleep 1
          done

          if [ "$WINDOW_FOUND" -ne 1 ]; then
            echo "::error::App window for package $PACKAGE was not detected within 30 seconds; aborting to avoid misleading UI screenshots."
            exit 1
          fi

          # Wait for the page to finish loading by polling the UI hierarchy.
          # The app shows "Checking authentication" then "Loading anime list" text
          # while data is being fetched. We poll until those indicators disappear,
          # with a hard cap to avoid hanging forever.
          MAX_WAIT=60
          MIN_WAIT=5
          POLL_INTERVAL=3
          echo "Waiting for page to finish loading (up to ${MAX_WAIT}s)..."
          sleep $MIN_WAIT
          ELAPSED=$MIN_WAIT
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Dump UI hierarchy to check for loading indicators
            adb shell uiautomator dump /sdcard/ui_dump.xml 2>/dev/null || true
            UI_DUMP=$(adb shell cat /sdcard/ui_dump.xml 2>/dev/null || echo "")
            if echo "$UI_DUMP" | grep -qi "Checking authentication"; then
              echo "  Still checking authentication... (${ELAPSED}s)"
            elif echo "$UI_DUMP" | grep -qi "Loading anime list"; then
              echo "  Still loading anime list... (${ELAPSED}s)"
            else
              echo "  Page appears ready after ${ELAPSED}s"
              # Brief extra settle time for final render
              sleep 2
              break
            fi
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::warning::Timed out waiting for page to load after ${MAX_WAIT}s — capturing anyway"
          fi

          mkdir -p screenshots

          # Screenshot 1: My Anime page (default flyout destination)
          adb shell screencap -p /sdcard/my_anime.png || echo "::warning::Failed to capture My Anime screenshot"
          adb pull /sdcard/my_anime.png screenshots/01_my_anime.png || echo "::warning::Failed to pull My Anime screenshot"
          echo "Captured: 01_my_anime.png (My Anime — $AUTH_MODE)"

          # Tap One Piece to open its details page
          tap_element_by_text "ONE PIECE" || echo "::warning::Could not find ONE PIECE in list"

          # Poll for the details page to load (up to 15s)
          DETAILS_WAIT=0
          while [ $DETAILS_WAIT -lt 15 ]; do
            adb shell uiautomator dump /sdcard/ui_details.xml 2>/dev/null || true
            if adb shell cat /sdcard/ui_details.xml 2>/dev/null | grep -qi "Episode"; then
              echo "  Details page ready after ${DETAILS_WAIT}s"
              sleep 1
              break
            fi
            sleep 1
            DETAILS_WAIT=$((DETAILS_WAIT + 1))
          done

          # Screenshot 2: One Piece details page
          adb shell screencap -p /sdcard/one_piece_details.png || echo "::warning::Failed to capture details screenshot"
          adb pull /sdcard/one_piece_details.png screenshots/02_one_piece_details.png || echo "::warning::Failed to pull details screenshot"
          echo "Captured: 02_one_piece_details.png (One Piece Details — $AUTH_MODE)"

          # Navigate back to My Anime, then open the Shell flyout and tap Settings.
          adb shell input keyevent KEYCODE_BACK

          # Poll for My Anime page to confirm the back navigation completed (up to 10s)
          # before attempting to open the flyout.
          # "My Anime" is the Shell page title for this route — always present in the
          # toolbar once the page is active, and never shown on the Details page.
          BACK_WAIT=0
          while [ $BACK_WAIT -lt 10 ]; do
            adb shell rm -f /sdcard/ui_back.xml >/dev/null 2>&1 || true
            if adb shell uiautomator dump /sdcard/ui_back.xml >/dev/null 2>&1 && \
               adb shell test -s /sdcard/ui_back.xml >/dev/null 2>&1 && \
               adb shell cat /sdcard/ui_back.xml 2>/dev/null | grep -q "My Anime"; then
              echo "  Back on My Anime after ${BACK_WAIT}s"
              sleep 1
              break
            fi
            sleep 1
            BACK_WAIT=$((BACK_WAIT + 1))
          done
          if [ "$BACK_WAIT" -ge 10 ]; then
            echo "::warning::Back navigation did not complete — flyout tap may fire on wrong page"
          fi

          # Open the Shell flyout via the hamburger icon ("Open navigation drawer").
          # Android 10+ gesture navigation intercepts left-edge swipes before they
          # reach the app, so tapping the DrawerToggle button is reliable regardless
          # of the system navigation mode.
          FLYOUT_OPENED=0
          for FLYOUT_ATTEMPT in 1 2 3; do
            echo "Flyout open attempt ${FLYOUT_ATTEMPT}..."
            tap_element_by_content_desc "Open navigation drawer" || true
            sleep 1
            adb shell rm -f /sdcard/ui_flyout_check.xml >/dev/null 2>&1 || true
            if adb shell uiautomator dump /sdcard/ui_flyout_check.xml >/dev/null 2>&1 && \
               adb shell test -s /sdcard/ui_flyout_check.xml >/dev/null 2>&1 && \
               adb shell cat /sdcard/ui_flyout_check.xml 2>/dev/null | grep -qi '"Settings"'; then
              echo "  Flyout confirmed open on attempt ${FLYOUT_ATTEMPT}"
              FLYOUT_OPENED=1
              break
            fi
          done

          if [ "$FLYOUT_OPENED" -eq 1 ]; then
            tap_element_by_text "Settings"
            sleep 2
          else
            echo "::warning::Flyout did not open — Settings screenshot may be incorrect"
          fi

          # Poll for Settings page to finish loading (up to 15s)
          # "Display Preferences" is a static label always visible once loaded.
          SETTINGS_LOAD_WAIT=0
          while [ $SETTINGS_LOAD_WAIT -lt 15 ]; do
            adb shell uiautomator dump /sdcard/ui_settings_loaded.xml 2>/dev/null || true
            SETTINGS_DUMP=$(adb shell cat /sdcard/ui_settings_loaded.xml 2>/dev/null || echo "")
            if echo "$SETTINGS_DUMP" | grep -q "Loading settings"; then
              echo "  Still loading settings... (${SETTINGS_LOAD_WAIT}s)"
            elif echo "$SETTINGS_DUMP" | grep -q "Display Preferences"; then
              echo "  Settings loaded after ${SETTINGS_LOAD_WAIT}s"
              sleep 1
              break
            fi
            sleep 1
            SETTINGS_LOAD_WAIT=$((SETTINGS_LOAD_WAIT + 1))
          done
          if [ $SETTINGS_LOAD_WAIT -ge 15 ]; then
            echo "::warning::Settings page did not finish loading — capturing anyway"
          fi

          # Screenshot 3: Settings page
          adb shell screencap -p /sdcard/settings.png || echo "::warning::Failed to capture Settings screenshot"
          adb pull /sdcard/settings.png screenshots/03_settings.png || echo "::warning::Failed to pull Settings screenshot"
          echo "Captured: 03_settings.png (Settings — $AUTH_MODE)"

          echo ""
          echo "Auth mode: $AUTH_MODE"
          echo "Screenshots captured:"
          ls -la screenshots/
          SCRIPT
          chmod +x /tmp/capture_screenshots.sh

      - name: Run Emulator & Capture Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_7_pro
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -prop persist.sys.locale=en-US
          disable-animations: true
          script: /tmp/capture_screenshots.sh

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 5
          if-no-files-found: warn

      - name: Commit Screenshots
        id: commit-screenshots
        # Cannot push to fork PRs — GITHUB_TOKEN lacks write access to the source repo
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ ! -d "screenshots" ] || [ -z "$(find screenshots -name '*.png' -type f 2>/dev/null)" ]; then
            echo "No screenshots to commit"
            echo "has_screenshots=false" >> $GITHUB_OUTPUT
            echo "screenshots_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_screenshots=true" >> $GITHUB_OUTPUT

          # If the PR branch has already been deleted (merged before CI finished),
          # pushing would fail with a non-fatal error. Skip the commit gracefully.
          if ! git ls-remote --exit-code --heads origin "$GITHUB_HEAD_REF" > /dev/null 2>&1; then
            echo "::warning::Branch '$GITHUB_HEAD_REF' no longer exists — PR was likely merged before CI finished. Skipping screenshot commit."
            echo "screenshots_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          if git diff --cached --quiet; then
            echo "Screenshots unchanged — nothing to commit"
          else
            git commit -m "CI: Update UI screenshots [skip ci]"
            git push
          fi
          echo "screenshots_published=true" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          SCREENSHOT_SHA: ${{ steps.commit-screenshots.outputs.sha }}
          HAS_SCREENSHOTS: ${{ steps.commit-screenshots.outputs.has_screenshots }}
          SCREENSHOTS_PUBLISHED: ${{ steps.commit-screenshots.outputs.screenshots_published }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-ui-screenshots -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const sha = process.env.SCREENSHOT_SHA;
            const hasScreenshots = process.env.HAS_SCREENSHOTS === 'true';
            const screenshotsPublished = process.env.SCREENSHOTS_PUBLISHED === 'true';

            const screenshots = [
              { file: 'screenshots/01_my_anime.png', label: 'My Anime' },
              { file: 'screenshots/02_one_piece_details.png', label: 'One Piece Details' },
              { file: 'screenshots/03_settings.png', label: 'Settings' },
            ];

            // Build image URLs using the commit SHA for reliable, cache-proof links
            const imageMarkdowns = [];
            if (hasScreenshots && screenshotsPublished && sha) {
              for (const shot of screenshots) {
                if (!fs.existsSync(shot.file)) {
                  core.warning(`Screenshot not found: ${shot.file}`);
                  continue;
                }
                const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${sha}/${shot.file}`;
                imageMarkdowns.push({ label: shot.label, url: rawUrl });
              }
            }

            // --- Build PR comment body ---
            const authNote = '> ✅ **Authenticated UI** — screenshots rendered via compile-time CI stub services with hardcoded data. No OAuth token required.';
            const pageDesc = '';

            const bodyParts = [
              marker,
              '## 📱 UI Screenshots',
              '',
              authNote,
              '',
              `**[View Workflow Run →](${runUrl})**`,
              '',
            ];

            if (imageMarkdowns.length > 0) {
              // Embed images side-by-side in a table
              bodyParts.push(
                '| ' + imageMarkdowns.map(i => `${i.label}${pageDesc}`).join(' | ') + ' |',
                '| ' + imageMarkdowns.map(() => ':---:').join(' | ') + ' |',
                '| ' + imageMarkdowns.map(i => `![${i.label}](${i.url})`).join(' | ') + ' |',
              );
            } else if (hasScreenshots) {
              bodyParts.push(
                '⚠️ Screenshots were captured for this run, but they were not published to the PR branch.',
                '',
                '> Download the **ui-screenshots** artifact from the Artifacts section at the bottom of the workflow run page.',
              );
            } else {
              bodyParts.push(
                '⚠️ No screenshots were captured for this run.',
                '',
                '> Download the **ui-screenshots** artifact from the Artifacts section at the bottom of the workflow run page.',
              );
            }

            const body = bodyParts.join('\n');

            // --- Post or update the PR comment ---
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing PR comment with screenshots');
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body,
              });
              core.info('Posted PR comment with screenshots');
            }

      - name: Generate Screenshot Summary
        if: always()
        run: |
          echo "## 📱 UI Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "screenshots" ] && [ "$(ls -A screenshots/ 2>/dev/null)" ]; then
            echo "Screenshots captured and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ✅ **Authenticated UI** — rendered via compile-time CI stub services with hardcoded data." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Screenshot | Page |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| \`01_my_anime.png\` | My Anime |" >> $GITHUB_STEP_SUMMARY
            echo "| \`02_one_piece_details.png\` | One Piece Details |" >> $GITHUB_STEP_SUMMARY
            echo "| \`03_settings.png\` | Settings |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No screenshots were captured. Check the emulator step logs." >> $GITHUB_STEP_SUMMARY
          fi
