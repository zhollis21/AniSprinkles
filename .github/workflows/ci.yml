# CI workflow: Builds the app, runs unit tests, and captures UI screenshots
# Triggers on push to main branch or pull request creation/update
# Screenshots are uploaded as artifacts and linked in PR comments
#
# Auth note: AniSprinkles uses OAuth 2.0 implicit grant via AniList's browser-based
# login — there is no username/password flow. The CI emulator has no stored token,
# so screenshots capture the **unauthenticated** state (sign-in prompt screens).
# This is intentional and useful for verifying the login UX across both flyout pages.
# No secrets or variables are required for this workflow to run.
name: CI Build & UI Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/AniSprinkles.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install MAUI Workload
        run: dotnet workload install maui-android

      - name: Restore Dependencies
        run: dotnet restore src/AniSprinkles.csproj

      - name: Build
        run: |
          dotnet build src/AniSprinkles.csproj \
            -c Debug \
            -f net10.0-android \
            -p:EmbedAssembliesIntoApk=true \
            --no-restore

      - name: Run Tests
        run: |
          # Auto-detect test projects so future additions are picked up
          TEST_PROJECTS=$(find . -name "*.csproj" \( -path "*/tests/*" -o -path "*/test/*" -o -name "*Test*.csproj" -o -name "*Tests*.csproj" \) | grep -v node_modules || true)
          if [ -n "$TEST_PROJECTS" ]; then
            echo "Found test projects:"
            echo "$TEST_PROJECTS"
            for proj in $TEST_PROJECTS; do
              dotnet test "$proj" --no-restore --verbosity normal
            done
          else
            echo "::notice::No test projects found. Tests will run automatically when added."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: src/bin/Debug/net10.0-android/*-Signed.apk
          retention-days: 7
          if-no-files-found: error

      - name: Generate Build Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "**Framework:** net10.0-android" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  ui-screenshots:
    name: UI Screenshots
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25
    # Screenshots are informational — emulator flakiness should not block the CI gate
    continue-on-error: true

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator & Capture Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e

            # Locate the APK
            APK_PATH=$(find apk -name "*-Signed.apk" -type f | head -1)
            if [ -z "$APK_PATH" ]; then
              echo "::error::No signed APK found in artifacts"
              exit 1
            fi
            echo "Installing APK: $APK_PATH"

            # Install the app on the emulator
            adb install "$APK_PATH"

            # Launch the app via intent
            adb shell monkey -p com.RainbowSprinkles.AniSprinkles \
              -c android.intent.category.LAUNCHER 1

            # Poll for app window to appear (up to 30s)
            echo "Waiting for app to start..."
            for i in $(seq 1 30); do
              if adb shell dumpsys window windows 2>/dev/null | grep -q "com.RainbowSprinkles.AniSprinkles"; then
                echo "App window detected after ${i}s"
                break
              fi
              sleep 1
            done

            # Allow extra time for initial render to complete
            sleep 5

            mkdir -p screenshots

            # The emulator has no OAuth token so screenshots show the unauthenticated
            # sign-in prompt. This is useful for catching login UX regressions.
            # (The app uses OAuth implicit grant via AniList's browser login — there
            # is no way to inject credentials in a headless CI emulator.)

            # Screenshot 1: My Anime page (default flyout destination — shows sign-in prompt)
            adb shell screencap -p /sdcard/my_anime.png || echo "::warning::Failed to capture My Anime screenshot"
            adb pull /sdcard/my_anime.png screenshots/01_my_anime.png || echo "::warning::Failed to pull My Anime screenshot"
            echo "Captured: 01_my_anime.png (My Anime — sign-in prompt)"

            # Navigate to Settings page via the flyout
            adb shell input keyevent KEYCODE_MENU || adb shell input swipe 0 500 300 500 300
            sleep 2
            # Tap approximate location of Settings item in flyout (may need tuning per emulator resolution)
            adb shell input tap 200 350
            sleep 3

            # Screenshot 2: Settings page (shows sign-in prompt or settings UI)
            adb shell screencap -p /sdcard/settings.png || echo "::warning::Failed to capture Settings screenshot"
            adb pull /sdcard/settings.png screenshots/02_settings.png || echo "::warning::Failed to pull Settings screenshot"
            echo "Captured: 02_settings.png (Settings — sign-in prompt)"

            echo ""
            echo "Screenshots captured:"
            ls -la screenshots/

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-ui-screenshots -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## 📱 UI Screenshots',
              '',
              'Screenshots from this CI run are available as build artifacts.',
              '',
              '> **Note:** The app uses OAuth (browser-based AniList login), so CI screenshots',
              '> show the **unauthenticated sign-in prompt** on each flyout page. This is useful',
              '> for catching login UX regressions. No secrets or credentials are needed.',
              '',
              `**[View Workflow Run →](${runUrl})**`,
              '',
              '| Screenshot | Page |',
              '|---|---|',
              '| `01_my_anime.png` | My Anime (sign-in prompt) |',
              '| `02_settings.png` | Settings (sign-in prompt) |',
              '',
              '> Download the **ui-screenshots** artifact from the Artifacts section at the bottom of the workflow run page.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing PR comment with screenshot link');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Posted PR comment with screenshot link');
            }

      - name: Generate Screenshot Summary
        if: always()
        run: |
          echo "## 📱 UI Screenshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "screenshots" ] && [ "$(ls -A screenshots/ 2>/dev/null)" ]; then
            echo "Screenshots captured and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> The app uses OAuth (AniList browser login) so CI screenshots show the" >> $GITHUB_STEP_SUMMARY
            echo "> **unauthenticated sign-in prompt**. No secrets or credentials are needed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Screenshot | Page |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| \`01_my_anime.png\` | My Anime (sign-in prompt) |" >> $GITHUB_STEP_SUMMARY
            echo "| \`02_settings.png\` | Settings (sign-in prompt) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No screenshots were captured. Check the emulator step logs." >> $GITHUB_STEP_SUMMARY
          fi
